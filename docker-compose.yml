services:
  db:
    image: postgres:16
    container_name: guardianai_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: guardianai
      POSTGRES_PASSWORD: guardianai_dev_pw
      POSTGRES_DB: guardianai
    ports:
      - "5432:5432"
    volumes:
      - guardianai_db_data:/var/lib/postgresql/data

  api:
    image: node:22
    container_name: guardianai_api
    working_dir: /app
    restart: unless-stopped
    depends_on:
      - db
    volumes:
      - ./:/app
    command: sh -c "npm install && cd apps/api && npx prisma generate && (npx prisma migrate deploy || npx prisma migrate dev --name init_models) && npx tsx src/server.ts"
    env_file:
      - apps/api/.env
    ports:
      - "4000:4000"

volumes:
  guardianai_db_data: